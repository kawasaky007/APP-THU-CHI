name: thu_chi_viet_nam
description: "Ứng dụng Quản lý Thu Chi Vợ Chồng bằng Flutter và Supabase."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.12.4
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env